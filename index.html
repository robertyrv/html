<!DOCTYPE html>
<html>
<head>
  <title>Login Admin</title>
  <style>
    body { font-family: Arial; text-align: center; margin-top: 100px; }
    input { display: block; margin: 10px auto; padding: 10px; }
    button { padding: 10px 20px; }
  </style>
</head>
<body>

<h2>Painel Admin - Login</h2>

<input type="text" id="user" placeholder="Usuário">
<input type="password" id="pass" placeholder="Senha">

<button onclick="login()">Entrar</button>

<script>
function login() {
  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  // login fixo (demo)
  if (user === "admin" && pass === "1234") {
    localStorage.setItem("auth", "true");
    window.location.href = "dashboard.html";
  } else {
    alert("Login inválido");
  }
}
</script>

</body>
</html>
<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body { font-family: Arial; }
    .top { background: #333; color: #fff; padding: 15px; }
    .box { padding: 20px; }
    button { padding: 10px; }
  </style>
</head>
<body>

<div class="top">
  Painel Admin
  <button onclick="logout()" style="float:right;">Sair</button>
</div>

<div class="box">
  <h2>Bem-vindo!</h2>
  <p>Você está logado como administrador.</p>
</div>

<script>
// proteção de acesso
if (localStorage.getItem("auth") !== "true") {
  window.location.href = "index.html";
}

function logout() {
  localStorage.removeItem("auth");
  window.location.href = "index.html";
}
</script>

</body>
</html>
