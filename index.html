<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RealBet - Cassino Online</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }
    body {
      background: linear-gradient(#1b1b1b, #2d0033);
      color: #fff;
    }
    header {
      background-color: #ffcc00;
      padding: 20px;
      text-align: center;
      color: #000;
    }
    header h1 {
      font-size: 2rem;
    }
    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 15px;
      background-color: #330066;
    }
    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
    .hero {
      background-image: url('https://via.placeholder.com/1200x400/ffcc00/000000?text=Jogue+o+Tigrinho+Agora');
      background-size: cover;
      background-position: center;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      text-shadow: 2px 2px #000;
    }
    .games {
      padding: 30px 15px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
    }
    .game {
      background-color: #222;
      border-radius: 10px;
      overflow: hidden;
      text-align: center;
    }
    .game img {
      width: 100%;
      height: auto;
    }
    .game p {
      padding: 10px;
    }
    .cta {
      text-align: center;
      margin: 30px 0;
    }
    .cta button {
      background-color: #ffcc00;
      border: none;
      padding: 15px 30px;
      font-size: 1rem;
      border-radius: 5px;
      cursor: pointer;
      color: #000;
      font-weight: bold;
    }
    footer {
      background-color: #111;
      padding: 20px;
      text-align: center;
      font-size: 0.9rem;
      color: #aaa;
    }
    @media (max-width: 600px) {
      header h1 {
        font-size: 1.5rem;
      }
      nav {
        flex-direction: column;
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>RealBet - Cassino Online</h1>
  </header>
  <nav>
    <a href="#">Início</a>
    <a href="#">Jogos</a>
    <a href="#">Promoções</a>
    <a href="#">Entrar</a>
    <a href="#">Cadastro</a>
  </nav>
  <div class="hero">
    <h2>Experimente agora o Jogo do Tigrinho!</h2>
  </div>
  <section class="games">
    <div class="game">
      <img src="https://via.placeholder.com/300x200/9900cc/ffffff?text=Jogo+do+Tigrinho" alt="Jogo do Tigrinho">
      <p>Jogo do Tigrinho</p>
    </div>
    <div class="game">
      <img src="https://via.placeholder.com/300x200/cc0000/ffffff?text=Roleta+Online" alt="Roleta">
      <p>Roleta Online</p>
    </div>
    <div class="game">
      <img src="https://via.placeholder.com/300x200/009933/ffffff?text=Caça-Níquel" alt="Slots">
      <p>Caça-Níquel</p>
    </div>
    <div class="game">
      <img src="https://via.placeholder.com/300x200/0033cc/ffffff?text=Blackjack" alt="Blackjack">
      <p>Blackjack</p>
    </div>
  </section>
  <div class="cta">
    <button>Cadastre-se Agora</button>
  </div>
  <footer>
    <p>© 2025 RealBet Cassino. Todos os direitos reservados.</p>
    <p>Este site é fictício e apenas para fins demonstrativos.</p>
  </footer>
</body>
</html>
